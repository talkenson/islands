# Islands server configuration.
# CLI flags with the same names override these values.

addr=:8080
auth-secret=dev-secret-change-me
visible-chunk-radius=2

# Leave empty to use the in-memory demo world.
world-map=artifacts/generated/world.islmap
world-journal=artifacts/generated/world.journal
world-players=artifacts/generated/world.players.json

storage-batch-interval=1s
storage-batch-max-chunks=128
compact-world-interval=0s

# One in-game day currently lasts 8 real minutes with the default clock.
# world-day-length=40m
world-day-length=8m
# 40 min / 200ms = 12000 ticks per day = 8 min realtime
# world-time-tick-interval=200ms
world-time-tick-interval=1s
world-seconds-per-tick=1

# Forest growth ticks per in-game day. Use 1 for once per day, 2 for twice,
# or 0 to disable automatic forest growth.
forest-growth-per-day=2
